<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>낱말장</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --bg-color: #f5f7fa;
            --card-color: #ffffff;
            --text-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px; /* 비고란 추가로 인해 최대 너비를 살짝 넓혔습니다 */
            background: var(--card-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
        }

        /* 공통 입력 양식 */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ccd6e0;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            min-width: 0;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        
        button:active {
            transform: scale(0.98);
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: #357abd; }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-sm { padding: 6px 12px; font-size: 0.9rem; }

        /* 메인 레이아웃 (PC 환경) */
        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        /* 카테고리 사이드바 */
        .sidebar {
            border-right: 2px solid #edf2f7;
            padding-right: 20px;
        }

        .sidebar h2, .content h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #4a5568;
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .category-item:hover, .category-item.active {
            background-color: #edf2f7;
            border-color: var(--primary-color);
        }

        .category-name {
            flex: 1;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 5px;
        }

        .category-actions {
            display: flex;
            gap: 4px;
        }

        /* 단어 콘텐츠 영역 */
        .content {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .word-table-container {
            overflow-x: auto;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: fixed;
        }

        th, td {
            padding: 14px 15px;
            border-bottom: 1px solid #e2e8f0;
            word-break: break-all;
        }

        th {
            background-color: #f8fafc;
            color: #4a5568;
            font-weight: 600;
        }

        tr:hover {
            background-color: #fcfdfd;
        }

        .word-actions {
            display: flex;
            gap: 6px;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
            font-style: italic;
        }

        /* 비고란 글씨 스타일 조정 */
        .td-note {
            color: #666;
            font-size: 0.95rem;
        }

        /* ===================================================
           📱 반응형 미디어 쿼리 (모바일 및 태블릿 환경)
        ====================================================== */
        
        @media (max-width: 1024px) {
            .container { padding: 20px; }
            .main-layout { grid-template-columns: 240px 1fr; gap: 20px; }
        }

        @media (max-width: 767px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            header h1 { font-size: 2rem; margin-bottom: 15px; }
            
            .main-layout {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .sidebar {
                border-right: none;
                border-bottom: 2px solid #edf2f7;
                padding-right: 0;
                padding-bottom: 20px;
            }

            /* 모바일에서 입력 요소 세로 정렬 */
            #wordFormContainer .input-group {
                flex-direction: column;
                gap: 8px;
            }
            
            #wordFormContainer .input-group button {
                width: 100%;
                padding: 12px;
            }

            th, td {
                padding: 10px 6px;
                font-size: 0.9rem;
            }
            
            .word-actions {
                flex-direction: column;
                gap: 4px;
            }
            
            .word-actions button {
                width: 100%;
                padding: 6px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>낱말장</h1>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <h2>언어 카테고리</h2>
            <div class="input-group" style="margin-bottom: 15px;">
                <input type="text" id="categoryInput" placeholder="새 언어 (예: 영어)">
                <button class="btn-primary btn-sm" onclick="addCategory()">추가</button>
            </div>
            <ul id="categoryList" class="category-list"></ul>
        </aside>

        <main class="content">
            <h2 id="currentCategoryTitle">언어를 선택해주세요</h2>
            
            <div id="wordFormContainer" style="display: none;">
                <div class="input-group">
                    <input type="text" id="wordInput" placeholder="단어 (예: Apple)">
                    <input type="text" id="meaningInput" placeholder="뜻 (예: 사과)">
                    <input type="text" id="noteInput" placeholder="비고 (예: 명사 / 예문)">
                    <button class="btn-success" onclick="addWord()">단어 추가</button>
                </div>

                <div class="word-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 30%;">단어</th>
                                <th style="width: 30%;">뜻</th>
                                <th style="width: 25%;">비고</th>
                                <th style="width: 15%;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="wordTableBody"></tbody>
                    </table>
                    <div id="emptyWordMessage" class="empty-message" style="display: none;">
                        등록된 단어가 없습니다. 첫 단어를 추가해보세요!
                    </div>
                </div>
            </div>

            <div id="noCategorySelectedMessage" class="empty-message">
                ← 카테고리를 선택하거나 새로 추가해주세요.
            </div>
        </main>
    </div>
</div>

<script>
    let dictionaryData = JSON.parse(localStorage.getItem('dictionaryData')) || {};
    let currentCategory = null;

    document.addEventListener('DOMContentLoaded', () => {
        renderCategories();
        renderWords();
    });

    function saveToLocalStorage() {
        localStorage.setItem('dictionaryData', JSON.stringify(dictionaryData));
    }

    /* ================= 카테고리 기능 ================= */
    
    function renderCategories() {
        const categoryList = document.getElementById('categoryList');
        categoryList.innerHTML = '';

        Object.keys(dictionaryData).forEach(category => {
            const li = document.createElement('li');
            li.className = `category-item ${currentCategory === category ? 'active' : ''}`;
            li.onclick = () => selectCategory(category);

            const nameSpan = document.createElement('span');
            nameSpan.className = 'category-name';
            nameSpan.innerText = category;

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'category-actions';

            const editBtn = document.createElement('button');
            editBtn.className = 'btn-primary btn-sm';
            editBtn.innerText = '✏️';
            editBtn.onclick = (e) => {
                e.stopPropagation(); 
                editCategory(category);
            };

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-danger btn-sm';
            deleteBtn.innerText = '🗑️';
            deleteBtn.onclick = (e) => {
                e.stopPropagation(); 
                deleteCategory(category);
            };

            actionsDiv.appendChild(editBtn);
            actionsDiv.appendChild(deleteBtn);
            li.appendChild(nameSpan);
            li.appendChild(actionsDiv);
            categoryList.appendChild(li);
        });
    }

    function addCategory() {
        const input = document.getElementById('categoryInput');
        const categoryName = input.value.trim();

        if (!categoryName) {
            alert('언어 이름을 입력해주세요.');
            return;
        }
        if (dictionaryData[categoryName]) {
            alert('이미 존재하는 언어 카테고리입니다.');
            return;
        }

        dictionaryData[categoryName] = [];
        saveToLocalStorage();
        input.value = '';
        
        selectCategory(categoryName);
    }

    function editCategory(oldName) {
        const newName = prompt(`'${oldName}' 카테고리의 새 이름을 입력하세요:`, oldName);
        if (newName === null) return; 
        
        const trimmedName = newName.trim();
        if (!trimmedName) {
            alert('이름은 공백일 수 없습니다.');
            return;
        }
        if (trimmedName !== oldName && dictionaryData[trimmedName]) {
            alert('이미 존재하는 카테고리 이름입니다.');
            return;
        }

        if (trimmedName !== oldName) {
            dictionaryData[trimmedName] = dictionaryData[oldName];
            delete dictionaryData[oldName];
            
            if (currentCategory === oldName) {
                currentCategory = trimmedName;
            }
            saveToLocalStorage();
            renderCategories();
            renderWords();
        }
    }

    function deleteCategory(categoryName) {
        if (confirm(`'${categoryName}' 카테고리와 내부의 모든 단어가 삭제됩니다. 정말 삭제하시겠습니까?`)) {
            delete dictionaryData[categoryName];
            saveToLocalStorage();
            
            if (currentCategory === categoryName) {
                currentCategory = null;
            }
            
            renderCategories();
            renderWords();
        }
    }

    function selectCategory(categoryName) {
        currentCategory = categoryName;
        renderCategories();
        renderWords();
    }


    /* ================= 단어 기능 (비고란 포함) ================= */

    function renderWords() {
        const wordFormContainer = document.getElementById('wordFormContainer');
        const noCategoryMessage = document.getElementById('noCategorySelectedMessage');
        const currentCategoryTitle = document.getElementById('currentCategoryTitle');
        const tbody = document.getElementById('wordTableBody');
        const emptyWordMessage = document.getElementById('emptyWordMessage');

        tbody.innerHTML = '';

        if (!currentCategory) {
            currentCategoryTitle.innerText = '언어를 선택해주세요';
            wordFormContainer.style.display = 'none';
            noCategoryMessage.style.display = 'block';
            return;
        }

        currentCategoryTitle.innerText = `🗂️ ${currentCategory} 단어장`;
        wordFormContainer.style.display = 'block';
        noCategoryMessage.style.display = 'none';

        const words = dictionaryData[currentCategory] || [];

        if (words.length === 0) {
            emptyWordMessage.style.display = 'block';
        } else {
            emptyWordMessage.style.display = 'none';
            
            words.forEach((item, index) => {
                const tr = document.createElement('tr');

                const tdWord = document.createElement('td');
                tdWord.innerText = item.word;

                const tdMeaning = document.createElement('td');
                tdMeaning.innerText = item.meaning;

                // 비고란 노드 생성 (비어있으면 하이픈 표시)
                const tdNote = document.createElement('td');
                tdNote.className = 'td-note';
                tdNote.innerText = item.note || '-';

                const tdActions = document.createElement('td');
                tdActions.className = 'word-actions';

                const editBtn = document.createElement('button');
                editBtn.className = 'btn-primary btn-sm';
                editBtn.innerText = '수정';
                editBtn.onclick = () => editWord(index);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-danger btn-sm';
                deleteBtn.innerText = '삭제';
                deleteBtn.onclick = () => deleteWord(index);

                tdActions.appendChild(editBtn);
                tdActions.appendChild(deleteBtn);
                
                tr.appendChild(tdWord);
                tr.appendChild(tdMeaning);
                tr.appendChild(tdNote); // 테이블에 비고 추가
                tr.appendChild(tdActions);
                
                tbody.appendChild(tr);
            });
        }
    }

    function addWord() {
        const wordInput = document.getElementById('wordInput');
        const meaningInput = document.getElementById('meaningInput');
        const noteInput = document.getElementById('noteInput');
        
        const word = wordInput.value.trim();
        const meaning = meaningInput.value.trim();
        const note = noteInput.value.trim(); // 비고 값 추출

        if (!word || !meaning) {
            alert('단어와 뜻을 모두 입력해주세요.');
            return;
        }

        if (!dictionaryData[currentCategory]) {
            dictionaryData[currentCategory] = [];
        }

        // 데이터 객체에 note 추가
        dictionaryData[currentCategory].push({ word, meaning, note });
        saveToLocalStorage();
        
        wordInput.value = '';
        meaningInput.value = '';
        noteInput.value = '';
        wordInput.focus();
        
        renderWords();
    }

    function editWord(index) {
        const currentWord = dictionaryData[currentCategory][index];
        
        const newWord = prompt('새로운 단어를 입력하세요:', currentWord.word);
        if (newWord === null) return; 

        const newMeaning = prompt('새로운 뜻을 입력하세요:', currentWord.meaning);
        if (newMeaning === null) return;

        const newNote = prompt('새로운 비고 내용을 입력하세요 (선택):', currentWord.note || '');
        if (newNote === null) return;

        if (!newWord.trim() || !newMeaning.trim()) {
            alert('단어와 뜻은 빈칸으로 둘 수 없습니다.');
            return;
        }

        dictionaryData[currentCategory][index] = {
            word: newWord.trim(),
            meaning: newMeaning.trim(),
            note: newNote.trim()
        };

        saveToLocalStorage();
        renderWords();
    }

    function deleteWord(index) {
        if (confirm('이 단어를 삭제하시겠습니까?')) {
            dictionaryData[currentCategory].splice(index, 1);
            saveToLocalStorage();
            renderWords();
        }
    }
</script>
</body>
</html>
